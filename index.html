<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Skin Downloader</title>

    <!-- Подключение пиксельного шрифта в стиле Minecraft -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Цветовая палитра в стиле Minecraft */
            --dirt-dark: #5a3d1c;
            --dirt-mid: #8b6914;
            --dirt-light: #b8a058;
            --grass-top: #5a8b3c;
            --grass-mid: #6a9b4c;
            --grass-light: #7aab5c;
            --stone-dark: #2d2d2d;
            --stone-mid: #4a4a4a;
            --stone-light: #6b6b6b;
            --border-dark: #1a0f07;
            --border-mid: #3b2a1f;
            --text-light: #e0d8c0;
            --text-bright: #f8f0d0;
            --error-red: #c0392b;
            --error-bg: #fce4e4;
            --success-green: #27ae60;
            --button-shadow: #1a0a00;
            --card-bg: #c8c0a8;
            --card-inner: #e8e0c8;
            --input-bg: #f5f0e0;
            --highlight-gold: #f9c922;
        }

        /* ===== ФОН С ТЕКСТУРОЙ ТРАВЫ/ЗЕМЛИ (пиксельный паттерн) ===== */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            /* Многослойный градиент, имитирующий пиксельную текстуру травы Minecraft */
            background-color: #6a9b4c;
            background-image:
                /* Травинки — мелкие зелёные пиксели */
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(90, 139, 60, 0.6) 3px,
                    rgba(90, 139, 60, 0.6) 4px),
                /* Земляной слой — коричневые пиксели */
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 7px,
                    rgba(139, 105, 20, 0.3) 7px,
                    rgba(139, 105, 20, 0.3) 8px),
                /* Основной зелёный фон травы */
                repeating-linear-gradient(180deg,
                    #7aab5c 0px,
                    #6a9b4c 4px,
                    #5a8b3c 8px,
                    #8b6914 8px,
                    #7a5b10 9px,
                    #6b4b0c 12px,
                    #5a3d1c 12px,
                    #4a3018 16px);
            background-size: 32px 32px;
            image-rendering: pixelated;
            padding: 20px;
            /* Лёгкая виньетка по краям */
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.35);
        }

        /* ===== ОСНОВНАЯ КАРТОЧКА (в стиле блока земли/камня) ===== */
        .main-card {
            width: 100%;
            max-width: 580px;
            background: var(--card-bg);
            border: 4px solid var(--stone-dark);
            /* Многослойная тень для эффекта объёмного блока */
            box-shadow:
                6px 6px 0px 0px var(--border-dark),
                8px 8px 0px 0px rgba(0, 0, 0, 0.3),
                12px 12px 24px rgba(0, 0, 0, 0.5),
                inset 2px 2px 0px 0px rgba(255, 255, 255, 0.25),
                inset -2px -2px 0px 0px rgba(0, 0, 0, 0.2);
            padding: 28px 24px 24px;
            position: relative;
            /* Внутренняя текстура карточки */
            background-image:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 3px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 3px);
            background-color: #d8d0b8;
            image-rendering: pixelated;
            transition: transform 0.1s ease;
        }

        /* ===== ЗАГОЛОВОК И ПОДЗАГОЛОВОК ===== */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 3px solid var(--border-mid);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: var(--border-dark);
            opacity: 0.5;
        }

        .title {
            font-size: clamp(0.8rem, 3.5vw, 1.2rem);
            color: #2a1a08;
            text-shadow:
                2px 2px 0px var(--highlight-gold),
                3px 3px 0px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            line-height: 1.6;
            word-break: break-word;
        }

        .subtitle {
            font-size: clamp(0.45rem, 1.8vw, 0.6rem);
            color: #5a4530;
            margin-top: 8px;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        /* ===== ФОРМА ВВОДА ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .label-nick {
            display: block;
            font-size: 0.65rem;
            color: #3b2a1f;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nick-input {
            flex: 1 1 200px;
            min-width: 180px;
            padding: 12px 14px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(0.5rem, 2vw, 0.7rem);
            background: var(--input-bg);
            border: 3px solid var(--border-dark);
            color: #2a1a08;
            letter-spacing: 1px;
            outline: none;
            box-shadow:
                inset 2px 2px 0px rgba(0, 0, 0, 0.2),
                inset -2px -2px 0px rgba(255, 255, 255, 0.3),
                2px 2px 0px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            image-rendering: pixelated;
        }

        .nick-input:focus {
            border-color: var(--highlight-gold);
            box-shadow:
                inset 2px 2px 0px rgba(0, 0, 0, 0.2),
                inset -2px -2px 0px rgba(255, 255, 255, 0.3),
                0px 0px 0px 3px rgba(249, 201, 34, 0.4),
                3px 3px 0px rgba(0, 0, 0, 0.3);
            background: #fffef5;
        }

        .nick-input.input-error {
            border-color: var(--error-red);
            animation: shake 0.4s ease;
            box-shadow:
                inset 2px 2px 0px rgba(0, 0, 0, 0.2),
                inset -2px -2px 0px rgba(255, 255, 255, 0.3),
                0px 0px 0px 4px rgba(192, 57, 43, 0.35);
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-6px);
            }
            50% {
                transform: translateX(6px);
            }
            75% {
                transform: translateX(-4px);
            }
        }

        /* ===== ПЕРЕКЛЮЧАТЕЛЬ ВЕРСИИ (радио-кнопки в стиле Minecraft) ===== */
        .version-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .version-option {
            flex: 1;
            min-width: 140px;
            position: relative;
        }

        .version-radio {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .version-label {
            display: block;
            padding: 12px 10px;
            text-align: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(0.45rem, 1.6vw, 0.6rem);
            background: #9b8c70;
            border: 3px solid var(--border-dark);
            color: #3b2a1f;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow:
                2px 2px 0px rgba(0, 0, 0, 0.3),
                inset 1px 1px 0px rgba(255, 255, 255, 0.2);
            transition: all 0.1s ease;
            user-select: none;
            image-rendering: pixelated;
        }

        .version-label:hover {
            background: #b0a080;
            transform: translateY(-1px);
            box-shadow:
                3px 3px 0px rgba(0, 0, 0, 0.3),
                inset 1px 1px 0px rgba(255, 255, 255, 0.25);
        }

        .version-label:active {
            transform: translateY(1px);
            box-shadow:
                1px 1px 0px rgba(0, 0, 0, 0.3),
                inset 1px 1px 0px rgba(255, 255, 255, 0.15);
        }

        .version-radio:checked+.version-label {
            background: #e8d080;
            border-color: var(--highlight-gold);
            color: #1a0a00;
            box-shadow:
                0px 0px 8px rgba(249, 201, 34, 0.5),
                3px 3px 0px rgba(0, 0, 0, 0.4),
                inset 2px 2px 0px rgba(255, 255, 255, 0.4);
            text-shadow: 0px 0px 2px rgba(249, 201, 34, 0.5);
        }

        .version-radio:focus-visible+.version-label {
            outline: 3px solid var(--highlight-gold);
            outline-offset: 2px;
        }

        /* ===== КНОПКА ПОИСКА ===== */
        .search-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(0.55rem, 2vw, 0.7rem);
            background: #5a8b3c;
            color: #f8f0d0;
            border: 3px solid var(--border-dark);
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow:
                4px 4px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.3),
                inset -2px -2px 0px rgba(0, 0, 0, 0.25);
            transition: all 0.08s ease;
            image-rendering: pixelated;
            position: relative;
            overflow: hidden;
        }

        .search-btn:hover:not(:disabled) {
            background: #6a9b4c;
            transform: translateY(-2px);
            box-shadow:
                6px 6px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.35),
                inset -2px -2px 0px rgba(0, 0, 0, 0.2);
        }

        .search-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow:
                2px 2px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.2),
                inset -2px -2px 0px rgba(0, 0, 0, 0.3);
            background: #4a7b2c;
        }

        .search-btn:disabled {
            background: #7a7a6a;
            color: #b0b0a0;
            cursor: not-allowed;
            box-shadow:
                2px 2px 0px rgba(0, 0, 0, 0.2),
                inset 1px 1px 0px rgba(255, 255, 255, 0.1);
            transform: none;
        }

        /* Анимация загрузки на кнопке */
        .search-btn.loading {
            background: #6a7a4c;
            color: #d0d0b0;
            pointer-events: none;
        }

        .search-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 16px;
            width: 16px;
            height: 16px;
            margin-top: -8px;
            border: 3px solid transparent;
            border-top-color: #f8f0d0;
            border-right-color: #f8f0d0;
            animation: spin 0.7s steps(8) infinite;
            image-rendering: pixelated;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== ИНДИКАТОР ЗАГРУЗКИ (спиннер) ===== */
        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
            font-size: 0.6rem;
            color: #5a4530;
            letter-spacing: 1px;
        }

        .loading-indicator.active {
            display: block;
        }

        .pixel-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            position: relative;
            animation: spin 0.8s steps(8) infinite;
            image-rendering: pixelated;
        }

        .pixel-spinner::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 4px solid #3b2a1f;
            border-top-color: #5a8b3c;
            border-right-color: #8b6914;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.2);
        }

        /* ===== ОБЛАСТЬ ПРЕВЬЮ СКИНА ===== */
        .preview-section {
            display: none;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 3px solid var(--border-mid);
            text-align: center;
        }

        .preview-section.visible {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-image-wrapper {
            display: inline-block;
            padding: 10px;
            background: #3b2a1f;
            border: 2px solid #1a0f07;
            box-shadow:
                4px 4px 0px rgba(0, 0, 0, 0.4),
                inset 2px 2px 0px rgba(255, 255, 255, 0.1),
                inset -2px -2px 0px rgba(0, 0, 0, 0.3);
            image-rendering: pixelated;
            margin-bottom: 12px;
        }

        .preview-image {
            display: block;
            width: 300px;
            height: 300px;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: repeating-linear-gradient(45deg,
                    #c8c0a8 0px,
                    #c8c0a8 8px,
                    #b8b098 8px,
                    #b8b098 16px);
            border: 2px solid #3b2a1f;
        }

        .preview-info {
            font-size: 0.55rem;
            color: #3b2a1f;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            line-height: 1.8;
            word-break: break-all;
        }

        .preview-info strong {
            color: #1a0a00;
            text-shadow: 1px 1px 0px rgba(249, 201, 34, 0.4);
        }

        /* ===== КНОПКА СКАЧИВАНИЯ ===== */
        .download-btn {
            display: inline-block;
            padding: 12px 28px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(0.5rem, 1.8vw, 0.65rem);
            background: #e8a030;
            color: #1a0a00;
            border: 3px solid var(--border-dark);
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow:
                3px 3px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.4),
                inset -2px -2px 0px rgba(0, 0, 0, 0.2);
            transition: all 0.08s ease;
            image-rendering: pixelated;
            position: relative;
        }

        .download-btn:hover {
            background: #f8b840;
            transform: translateY(-2px);
            box-shadow:
                5px 5px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.45),
                inset -2px -2px 0px rgba(0, 0, 0, 0.15);
        }

        .download-btn:active {
            transform: translateY(2px);
            box-shadow:
                1px 1px 0px var(--button-shadow),
                inset 2px 2px 0px rgba(255, 255, 255, 0.3),
                inset -2px -2px 0px rgba(0, 0, 0, 0.25);
            background: #d89020;
        }

        /* ===== СООБЩЕНИЯ ОБ ОШИБКАХ ===== */
        .message-area {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            font-size: 0.5rem;
            letter-spacing: 0.5px;
            line-height: 1.6;
            border: 3px solid;
            text-align: center;
            image-rendering: pixelated;
        }

        .message-area.visible {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .message-area.error {
            background: #fce4e4;
            border-color: #c0392b;
            color: #7b1a1a;
            box-shadow: 2px 2px 0px rgba(192, 57, 43, 0.3);
        }

        .message-area.info {
            background: #e4f0fc;
            border-color: #2980b9;
            color: #1a3a5b;
            box-shadow: 2px 2px 0px rgba(41, 128, 185, 0.3);
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 600px) {
            .main-card {
                padding: 16px 12px 14px;
                border-width: 3px;
                box-shadow:
                    4px 4px 0px 0px var(--border-dark),
                    6px 6px 0px 0px rgba(0, 0, 0, 0.3),
                    8px 8px 20px rgba(0, 0, 0, 0.5);
            }

            .preview-image {
                width: 200px;
                height: 200px;
            }

            .preview-image-wrapper {
                padding: 6px;
            }

            .version-selector {
                flex-direction: column;
                gap: 6px;
            }

            .version-option {
                min-width: auto;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .nick-input {
                width: 100%;
                font-size: 0.6rem;
                padding: 10px 12px;
            }

            .search-btn {
                font-size: 0.6rem;
                padding: 12px 14px;
            }

            .title {
                font-size: 0.75rem;
            }

            .subtitle {
                font-size: 0.45rem;
            }
        }

        @media (max-width: 380px) {
            .preview-image {
                width: 150px;
                height: 150px;
            }

            .main-card {
                padding: 10px 8px 10px;
                border-width: 2px;
            }

            .title {
                font-size: 0.65rem;
            }

            .subtitle {
                font-size: 0.4rem;
            }

            .version-label {
                font-size: 0.4rem;
                padding: 10px 6px;
            }

            .search-btn {
                font-size: 0.5rem;
                padding: 10px 12px;
            }

            .download-btn {
                font-size: 0.45rem;
                padding: 10px 18px;
            }
        }

        @media (min-width: 1200px) {
            .main-card {
                max-width: 650px;
                padding: 36px 32px 30px;
            }
            .preview-image {
                width: 350px;
                height: 350px;
            }
            .title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ОСНОВНАЯ КАРТОЧКА ПРИЛОЖЕНИЯ ===== -->
    <div class="main-card" role="main" aria-label="Minecraft Skin Downloader">

        <!-- Заголовок -->
        <header class="header">
            <h1 class="title">⛏ Minecraft Skin Downloader</h1>
            <p class="subtitle">Скачай скин по нику — Java &amp; Bedrock</p>
        </header>

        <!-- Форма ввода ника -->
        <div class="form-group">
            <label class="label-nick" for="nicknameInput">Никнейм игрока:</label>
            <div class="input-wrapper">
                <input
                type="text"
                id="nicknameInput"
                class="nick-input"
                placeholder="Например: Steve"
                autocomplete="off"
                spellcheck="false"
                maxlength="36"
                aria-label="Введите никнейм игрока"
                >
            </div>
        </div>

        <!-- Переключатель версии (радио-кнопки) -->
        <fieldset style="border: none; padding: 0; margin: 0;">
            <legend style="display: none;">Выберите версию игры</legend>
            <div class="version-selector" role="radiogroup" aria-label="Версия игры">
                <div class="version-option">
                    <input
                    type="radio"
                    id="versionJava"
                    name="version"
                    value="java"
                    class="version-radio"
                    checked
                    >
                    <label for="versionJava" class="version-label">☕ Java Edition</label>
                </div>
                <div class="version-option">
                    <input
                    type="radio"
                    id="versionBedrock"
                    name="version"
                    value="bedrock"
                    class="version-radio"
                    >
                    <label for="versionBedrock" class="version-label">🪨 Bedrock Edition</label>
                </div>
            </div>
        </fieldset>

        <!-- Кнопка поиска -->
        <button id="searchBtn" class="search-btn" type="button" aria-label="Загрузить скин">
            🔍 Загрузить скин
        </button>

        <!-- Индикатор загрузки -->
        <div id="loadingIndicator" class="loading-indicator" aria-live="polite">
            <div class="pixel-spinner"></div>
            <p>Загрузка...</p>
        </div>

        <!-- Область сообщений (ошибки / инфо) -->
        <div id="messageArea" class="message-area" role="alert" aria-live="assertive"></div>

        <!-- Область превью скина (изначально скрыта) -->
        <section id="previewSection" class="preview-section" aria-label="Предпросмотр скина">
            <div class="preview-image-wrapper">
                <img
                id="previewImage"
                class="preview-image"
                src=""
                alt="Предпросмотр скина"
                crossorigin="anonymous"
                >
            </div>
            <p class="preview-info" id="previewInfo"></p>
            <button id="downloadBtn" class="download-btn" type="button" aria-label="Скачать скин">
                💾 Скачать скин
            </button>
        </section>
    </div>

    <script>
        (function() {
            // ===== DOM-ЭЛЕМЕНТЫ =====
            const nicknameInput = document.getElementById('nicknameInput');
            const searchBtn = document.getElementById('searchBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const messageArea = document.getElementById('messageArea');
            const previewSection = document.getElementById('previewSection');
            const previewImage = document.getElementById('previewImage');
            const previewInfo = document.getElementById('previewInfo');
            const downloadBtn = document.getElementById('downloadBtn');
            const versionRadios = document.querySelectorAll('input[name="version"]');

            // ===== ПЕРЕМЕННЫЕ СОСТОЯНИЯ =====
            let currentSkinBlob = null; // Blob скина для скачивания
            let currentSkinUrl = null; // URL скина (для fallback)
            let currentNickname = ''; // Текущий ник (после обработки)
            let currentVersion = 'java'; // Текущая версия
            let abortController = null; // Контроллер для отмены запроса по таймауту
            let isSearching = false; // Флаг блокировки повторных запросов

            // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====

            /**
             * Показывает или скрывает сообщение в области messageArea.
             * @param {string} text - Текст сообщения.
             * @param {'error'|'info'} type - Тип сообщения.
             */
            function showMessage(text, type = 'error') {
                messageArea.textContent = text;
                messageArea.className = 'message-area visible ' + type;
            }

            /** Скрывает область сообщений. */
            function hideMessage() {
                messageArea.className = 'message-area';
                messageArea.textContent = '';
            }

            /** Показывает секцию превью. */
            function showPreview() {
                previewSection.classList.add('visible');
            }

            /** Скрывает секцию превью и сбрасывает изображение. */
            function hidePreview() {
                previewSection.classList.remove('visible');
                previewImage.src = '';
                previewInfo.textContent = '';
                downloadBtn.style.display = 'none';
                currentSkinBlob = null;
                currentSkinUrl = null;
            }

            /** Показывает индикатор загрузки. */
            function showLoading() {
                loadingIndicator.classList.add('active');
                searchBtn.classList.add('loading');
                searchBtn.disabled = true;
                isSearching = true;
            }

            /** Скрывает индикатор загрузки. */
            function hideLoading() {
                loadingIndicator.classList.remove('active');
                searchBtn.classList.remove('loading');
                searchBtn.disabled = false;
                isSearching = false;
            }

            /**
             * Подсвечивает поле ввода ошибкой.
             */
            function highlightInputError() {
                nicknameInput.classList.add('input-error');
                // Убираем подсветку через 1.5 секунды
                setTimeout(() => {
                    nicknameInput.classList.remove('input-error');
                }, 1500);
            }

            /**
             * Получает выбранную версию из радио-кнопок.
             * @returns {'java'|'bedrock'}
             */
            function getSelectedVersion() {
                for (const radio of versionRadios) {
                    if (radio.checked) {
                        return radio.value;
                    }
                }
                return 'java'; // По умолчанию
            }

            /**
             * Обрабатывает никнейм: обрезает пробелы, приводит к нижнему регистру.
             * @param {string} raw - Сырой ввод пользователя.
             * @returns {string} Обработанный никнейм.
             */
            function sanitizeNickname(raw) {
                return raw.trim().toLowerCase();
            }

            /**
             * Создаёт AbortController с таймаутом 10 секунд.
             * @returns {{ controller: AbortController, timeoutId: number }}
             */
            function createTimeoutController() {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                }, 10000); // 10 секунд таймаут
                return { controller, timeoutId };
            }

            // ===== ОСНОВНАЯ ЛОГИКА ПОИСКА СКИНА =====

            /**
             * Загружает скин для Java Edition.
             * Сначала получает UUID через Mojang API, затем скин через Crafatar.
             * @param {string} nickname - Обработанный никнейм.
             * @param {AbortSignal} signal - Сигнал для отмены запроса.
             * @returns {Promise<{ blob: Blob, url: string, displayName: string }>}
             */
            async function fetchJavaSkin(nickname, signal) {
                // Шаг 1: Получаем UUID игрока через Mojang API
                const uuidUrl = `https://api.mojang.com/users/profiles/minecraft/${encodeURIComponent(nickname)}`;
                const uuidResponse = await fetch(uuidUrl, { signal });

                // Если статус 204 (No Content) — игрок не найден
                if (uuidResponse.status === 204) {
                    throw new Error('Игрок не найден в Java Edition');
                }

                // Проверяем статус ответа
                if (!uuidResponse.ok) {
                    throw new Error('Сервер временно недоступен');
                }

                // Парсим JSON с UUID
                let uuidData;
                try {
                    uuidData = await uuidResponse.json();
                } catch (parseError) {
                    throw new Error('Сервер временно недоступен');
                }

                // Проверяем наличие UUID в ответе
                if (!uuidData || !uuidData.id) {
                    throw new Error('Игрок не найден в Java Edition');
                }

                const uuid = uuidData.id;
                // Оригинальное имя из ответа API (может отличаться регистром)
                const displayName = uuidData.name || nickname;

                // Шаг 2: Загружаем скин через Crafatar (прямая ссылка на PNG)
                const skinUrl = `https://crafatar.com/skins/${encodeURIComponent(uuid)}?size=512`;
                const skinResponse = await fetch(skinUrl, { signal });

                if (!skinResponse.ok) {
                    throw new Error('Сервер временно недоступен');
                }

                const blob = await skinResponse.blob();

                // Проверяем, что blob не пустой
                if (blob.size === 0) {
                    throw new Error('Скин не найден для Java Edition');
                }

                return {
                    blob: blob,
                    url: skinUrl,
                    displayName: displayName
                };
            }

            /**
             * Загружает скин для Bedrock Edition через GeyserMC API.
             * @param {string} nickname - Обработанный никнейм.
             * @param {AbortSignal} signal - Сигнал для отмены запроса.
             * @returns {Promise<{ blob: Blob, url: string, displayName: string }>}
             */
            async function fetchBedrockSkin(nickname, signal) {
                const apiUrl = `https://api.geysermc.org/v2/skin/${encodeURIComponent(nickname)}`;
                const apiResponse = await fetch(apiUrl, { signal });

                if (!apiResponse.ok) {
                    // Если статус не 2xx — возможно, игрок не найден или сервер недоступен
                    if (apiResponse.status === 404) {
                        throw new Error('Скин не найден для Bedrock Edition');
                    }
                    throw new Error('Сервер временно недоступен');
                }

                // Парсим JSON-ответ от GeyserMC
                let skinData;
                try {
                    skinData = await apiResponse.json();
                } catch (parseError) {
                    throw new Error('Сервер временно недоступен');
                }

                // Проверяем наличие поля skin_url
                if (!skinData || !skinData.skin_url) {
                    throw new Error('Скин не найден для Bedrock Edition');
                }

                const skinUrl = skinData.skin_url;

                // Загружаем изображение скина по URL из ответа
                const skinResponse = await fetch(skinUrl, { signal });

                if (!skinResponse.ok) {
                    throw new Error('Сервер временно недоступен');
                }

                const blob = await skinResponse.blob();

                if (blob.size === 0) {
                    throw new Error('Скин не найден для Bedrock Edition');
                }

                return {
                    blob: blob,
                    url: skinUrl,
                    displayName: skinData.username || nickname
                };
            }

            /**
             * Главная функция поиска и загрузки скина.
             */
            async function performSearch() {
                // Блокируем повторные нажатия
                if (isSearching) return;

                // Получаем и обрабатываем никнейм
                const rawNick = nicknameInput.value;
                const nickname = sanitizeNickname(rawNick);

                // Валидация: ник не должен быть пустым
                if (!nickname) {
                    showMessage('Введите ник', 'error');
                    highlightInputError();
                    nicknameInput.focus();
                    return;
                }

                // Сбрасываем предыдущие результаты
                hideMessage();
                hidePreview();
                abortController = null;

                // Получаем выбранную версию
                const version = getSelectedVersion();
                currentVersion = version;
                currentNickname = nickname;

                // Показываем индикатор загрузки
                showLoading();

                // Создаём контроллер с таймаутом
                const { controller, timeoutId } = createTimeoutController();
                abortController = controller;
                const signal = controller.signal;

                try {
                    let result;

                    // Выбираем API в зависимости от версии
                    if (version === 'java') {
                        result = await fetchJavaSkin(nickname, signal);
                    } else {
                        result = await fetchBedrockSkin(nickname, signal);
                    }

                    // Очищаем таймаут (запрос завершился успешно)
                    clearTimeout(timeoutId);

                    // Сохраняем результат
                    currentSkinBlob = result.blob;
                    currentSkinUrl = result.url;

                    // Отображаем превью
                    const objectUrl = URL.createObjectURL(result.blob);
                    previewImage.src = objectUrl;
                    // Освобождаем object URL после загрузки изображения
                    previewImage.onload = () => {
                        URL.revokeObjectURL(objectUrl);
                    };
                    previewImage.onerror = () => {
                        URL.revokeObjectURL(objectUrl);
                        // Если изображение не загрузилось, пробуем прямую ссылку
                        previewImage.src = result.url;
                    };

                    // Формируем информационную строку
                    const versionLabel = version === 'java' ? 'Java Edition' : 'Bedrock Edition';
                    previewInfo.innerHTML = `
                        <strong>Ник:</strong> ${escapeHTML(result.displayName)}<br>
                        <strong>Версия:</strong> ${escapeHTML(versionLabel)}
                    `;

                    // Показываем кнопку скачивания
                    downloadBtn.style.display = 'inline-block';
                    showPreview();
                    hideMessage();

                } catch (error) {
                    // Очищаем таймаут в любом случае
                    clearTimeout(timeoutId);

                    // Определяем тип ошибки и показываем соответствующее сообщение
                    let errorMessage = 'Неизвестная ошибка';

                    if (error.name === 'AbortError') {
                        // Таймаут или отмена запроса
                        errorMessage = 'Ошибка сети. Проверьте подключение';
                    } else if (error.message) {
                        // Используем сообщение из выброшенной ошибки
                        errorMessage = error.message;
                    } else if (error instanceof TypeError) {
                        // Сетевые ошибки (нет интернета, CORS и т.д.)
                        errorMessage = 'Ошибка сети. Проверьте подключение';
                    }

                    // Показываем сообщение об ошибке
                    showMessage(errorMessage, 'error');
                    hidePreview();

                    // Логируем ошибку в консоль для отладки (без прерывания работы)
                    console.warn('Minecraft Skin Downloader: ошибка при загрузке скина:', error);
                } finally {
                    // Всегда скрываем индикатор загрузки
                    hideLoading();
                    abortController = null;
                }
            }

            /**
             * Экранирует HTML-символы для безопасного вывода.
             * @param {string} str - Исходная строка.
             * @returns {string} Экранированная строка.
             */
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ===== ФУНКЦИЯ СКАЧИВАНИЯ СКИНА =====

            /**
             * Скачивает скин в формате PNG.
             * Использует сохранённый blob или загружает по URL.
             */
            async function downloadSkin() {
                if (!currentSkinBlob && !currentSkinUrl) {
                    showMessage('Нет загруженного скина для скачивания', 'error');
                    return;
                }

                const versionSuffix = currentVersion === 'java' ? 'java' : 'bedrock';
                const fileName = `${currentNickname}_${versionSuffix}.png`;

                try {
                    let blobToDownload = currentSkinBlob;

                    // Если blob по какой-то причине отсутствует, пробуем загрузить по URL
                    if (!blobToDownload && currentSkinUrl) {
                        const response = await fetch(currentSkinUrl);
                        if (!response.ok) {
                            throw new Error('Не удалось загрузить скин для скачивания');
                        }
                        blobToDownload = await response.blob();
                        currentSkinBlob = blobToDownload; // Кешируем
                    }

                    if (!blobToDownload) {
                        throw new Error('Нет данных для скачивания');
                    }

                    // Создаём временную ссылку для скачивания
                    const downloadUrl = URL.createObjectURL(blobToDownload);
                    const downloadLink = document.createElement('a');
                    downloadLink.href = downloadUrl;
                    downloadLink.download = fileName;
                    downloadLink.style.display = 'none';

                    // Добавляем в DOM, кликаем и удаляем
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);

                    // Освобождаем память
                    // Небольшая задержка для гарантии завершения скачивания
                    setTimeout(() => {
                        URL.revokeObjectURL(downloadUrl);
                    }, 1000);

                } catch (error) {
                    console.warn('Minecraft Skin Downloader: ошибка при скачивании:', error);
                    // Пробуем альтернативный способ — открыть изображение в новой вкладке
                    if (currentSkinUrl) {
                        try {
                            const fallbackLink = document.createElement('a');
                            fallbackLink.href = currentSkinUrl;
                            fallbackLink.download = fileName;
                            fallbackLink.target = '_blank';
                            fallbackLink.rel = 'noopener';
                            fallbackLink.style.display = 'none';
                            document.body.appendChild(fallbackLink);
                            fallbackLink.click();
                            document.body.removeChild(fallbackLink);
                        } catch (fallbackError) {
                            showMessage('Не удалось скачать скин. Попробуйте ещё раз.', 'error');
                        }
                    } else {
                        showMessage('Не удалось скачать скин. Попробуйте ещё раз.', 'error');
                    }
                }
            }

            // ===== ОБРАБОТЧИКИ СОБЫТИЙ =====

            // Кнопка поиска
            searchBtn.addEventListener('click', () => {
                performSearch();
            });

            // Отправка по Enter в поле ввода
            nicknameInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    performSearch();
                }
            });

            // Кнопка скачивания
            downloadBtn.addEventListener('click', () => {
                downloadSkin();
            });

            // Очистка сообщения при вводе нового ника
            nicknameInput.addEventListener('input', () => {
                if (messageArea.classList.contains('visible')) {
                    hideMessage();
                }
                // Убираем подсветку ошибки при вводе
                if (nicknameInput.classList.contains('input-error')) {
                    nicknameInput.classList.remove('input-error');
                }
            });

            // Смена версии — сбрасываем результаты
            for (const radio of versionRadios) {
                radio.addEventListener('change', () => {
                    hidePreview();
                    hideMessage();
                    if (abortController) {
                        abortController.abort();
                        abortController = null;
                    }
                    hideLoading();
                });
            }

            // ===== ОБРАБОТКА ЗАКРЫТИЯ/УХОДА СО СТРАНИЦЫ =====
            // Отменяем активные запросы при уходе со страницы
            window.addEventListener('beforeunload', () => {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
            });

            // ===== ИНИЦИАЛИЗАЦИЯ =====
            // Устанавливаем начальное состояние
            hidePreview();
            hideMessage();
            hideLoading();
            downloadBtn.style.display = 'none';

            // Фокус на поле ввода для удобства
            nicknameInput.focus();

            console.log('⛏ Minecraft Skin Downloader готов к работе!');
            console.log('   Поддерживаемые версии: Java Edition (Mojang API + Crafatar) и Bedrock Edition (GeyserMC API)');
            console.log('   Введите никнейм и нажмите "Загрузить скин"');
        })();
    </script>
</body>
</html>
